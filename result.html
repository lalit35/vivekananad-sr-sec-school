<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #fff;
        }

        .header {
            background-color: #2a5298;
            width: 100%;
            padding: 10px;
            text-align: center;
            margin-bottom: 20px;
        }

        .school-name {
            font-size: 18px;
            font-weight: bold;
            color: #FFDC5E;
        }

        .container {
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        h2 {
            color: #FFDC5E;
            margin-bottom: 20px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: none;
            background: #444;
            color: white;
            text-transform: uppercase; /* Force uppercase visually */
        }

        .btn {
            padding: 12px;
            background: #FFDC5E;
            border: none;
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
            font-size: 16px;
        }

        .result-box {
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            margin-top: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .call-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #25D366;
            color: white;
            border-radius: 50%;
            padding: 15px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="header">
    <div class="school-name">Vivekanand Sr. Sec. School, Bhattu Kalan</div>
    <div>VS-1st Scholarship Test</div>
</div>

<div class="container" id="searchBox">
    <h2>Enter Your Roll No.</h2>

    <form id="resultForm">
        <input 
            type="text" 
            id="rollNo" 
            class="input-field"
            placeholder="Enter Roll Number (VSS...)"
            oninput="this.value = this.value.toUpperCase()"
            pattern="VSS[0-9]+"
            title="Roll number must start with VSS (e.g., VSS101)"
            required
        >

        <button type="submit" class="btn">Get Result</button>
    </form>

    <div id="result"></div>
</div>

<div class="result-box" id="resultBox">
    <h2>Student Result</h2>

    <p><strong>Name:</strong> <span id="studentName"></span></p>
    <p><strong>Marks:</strong> <span id="studentMarks"></span> / 100</p>

    <a href="tel:+9416848776" class="call-btn">
        <i class="fas fa-phone"></i>
    </a>
</div>

<script>
    let results = [];

    // Load JSON data
    fetch('result.json')
    .then(res => res.json())
    .then(data => {
        results = data;
    })
    .catch(() => {
        document.getElementById('result').innerHTML =
        '<p class="error">Error loading data</p>';
    });

    // Form submit
    document.getElementById('resultForm').addEventListener('submit', function(e) {
        e.preventDefault();

        let rollNo = document.getElementById('rollNo').value.trim().toUpperCase();
        let resultDiv = document.getElementById('result');

        // Extra validation
        if (!rollNo.startsWith("VSS")) {
            resultDiv.innerHTML = '<p class="error">Roll number must start with VSS.</p>';
            return;
        }

        let student = results.find(r => r["Roll No."] == rollNo);

        if (student) {
            document.getElementById('searchBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'block';

            document.getElementById('studentName').innerText = student.Name;
            document.getElementById('studentMarks').innerText = student.Marks;
        } else {
            resultDiv.innerHTML = '<p class="error">No result found for this roll number.</p>';
        }
    });
</script>

</body>
</html>
